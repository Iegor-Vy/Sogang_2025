# Why It Matters in Economics &amp; Business

In real economic environments, multiple inputs and variables affect production, utility, and costs. 

Understanding **how sensitive an output is to one specific input** (holding others constant) is key to making efficient decisions.

- Partial elasticities tell us **how responsive** an outcome is to one variable
- Marginal rates (MRS and MRTS) help understand **trade-offs** in consumption and production
- EulerŌĆÖs theorem links elasticities and returns to scale in production functions for homogeneous production functions

This is foundational for microeconomic theory, cost analysis, and optimization problems.

Let's begin!

# 1. Partial Elasticity and Marginal Functions (5.2)

---



# Learning Objectives

- Calculate **partial elasticities**

- Calculate **marginal utilities** and **marginal products**

- Calculate the MRS (Marginal Rate of Substitution)

- Calculate the **marginal rate of technical substitution** (MRTS)

- Understand **Euler's theorem** for homogeneous functions

---

# What is Partial Elasticity?

- **Partial elasticity** measures the percentage change in a function (e.g., output, utility) when **one variable changes**, holding the **other constant**.

### Formula:
If `\(z = f(x, y)\)`, then:
$$
E_x = \frac{\partial z}{\partial x} \cdot \frac{x}{z}, \quad E_y = \frac{\partial z}{\partial y} \cdot \frac{y}{z}
$$

- This is a local (point) elasticity, not an average change.

---

# Example: Partial Elasticities
Let `\(Q = x^{0.5} y^{0.5}\)`

- `\(\frac{\partial Q}{\partial x} = 0.5x^{-0.5}y^{0.5}\)`
- `\(\frac{\partial Q}{\partial y} = 0.5x^{0.5}y^{-0.5}\)`

Then:
$$
E_x = 0.5x^{-0.5}y^{0.5} \cdot \frac{x}{x^{0.5}y^{0.5}} = 0.5, \quad E_y = 0.5
$$

Interpretation: **1% increase** in `\(x\)` or `\(y\)` increases `\(Q\)` by **0.5%**.

---

# Marginal Utilities

If `\(U = f(x, y)\)` is a utility function:
- `\(MU_x = \frac{\partial U}{\partial x}\)`
- `\(MU_y = \frac{\partial U}{\partial y}\)`

These represent the **extra utility** from consuming **one more unit** of good `\(x\)` or `\(y\)`.

Usually diminishing in realistic models (i.e., `\(MU\)` decreases as consumption increases).

---

# Example: Marginal Utility
Let `\(U(x, y) = 2x + 3y\)`.

- `\(MU_x = 2\)`
- `\(MU_y = 3\)`

Interpretation: Utility increases by **2 units** for each extra unit of `\(x\)`, **3 units** for `\(y\)`.

This implies no diminishing marginal utility (perfect substitutes case).
---

# Marginal Product

If `\(Q = f(L, K)\)` is a production function:
- `\(MP_L = \frac{\partial Q}{\partial L}\)`
- `\(MP_K = \frac{\partial Q}{\partial K}\)`

These are used in **firm decisions** about labor and capital inputs.

---

# Example: Marginal Product
Let `\(Q = 10L^{0.5}K^{0.5}\)`.
- `\(MP_L = 5L^{-0.5}K^{0.5}\)`
- `\(MP_K = 5L^{0.5}K^{-0.5}\)`

At `\(L=4\)`, `\(K=9\)`:
- `\(MP_L = 5 \cdot \frac{1}{2} \cdot 3 = 7.5\)`
- `\(MP_K = 5 \cdot 2 \cdot \frac{1}{3} = 3.33\)`

---

# Marginal Rate of Substitution (MRS)

Rate a consumer substitutes `\(x\)` for `\(y\)` **keeping utility constant**:

$$
MRS = \left| \frac{MU_x}{MU_y} \right|
$$

---

# Example: MRS
Let `\(U(x, y) = x^{0.5}y^{0.5}\)`
- `\(MU_x = 0.5x^{-0.5}y^{0.5}\)`
- `\(MU_y = 0.5x^{0.5}y^{-0.5}\)`

Then:
$$
MRS = \left| \frac{MU_x}{MU_y} \right| = \left| \frac{y}{x} \right|
$$

Interpretation: At `\((x, y) = (2, 4)\)`, `\(MRS = 2\)`. The consumer is willing to give up 2 units of `\(y\)` for 1 more unit of `\(x\)` while keeping utility constant.

---

# Marginal Rate of Technical Substitution (MRTS)

In production:
$$
MRTS = \left| \frac{MP_L}{MP_K} \right|
$$

This tells how many units of capital can be reduced when the firm uses one more unit of labor, holding output constant.

&gt; slope of isoquant = -MRTS

.tiny[Note: MRTS is usually reported as a positive number. The isoquant slope is negative because increasing labor requires reducing capital to keep output unchanged.]
---

# Visual: Isoquant and MRTS

&lt;div style="text-align:center;"&gt;
  &lt;img src="p1.png" width="50%"&gt;
&lt;/div&gt;

It shows the **trade-off** between labor and capital while keeping output constant. The slope of the isoquant is `\(-MRTS\)`, so the absolute value of the slope is the MRTS.

A steeper isoquant means a higher MRTS: labor can replace more capital.
.tiny[Note: The isoquant represents all combinations of labor and capital that produce the same level of output. The MRTS changes along the isoquant, reflecting diminishing returns to substitution.]
---

# EulerŌĆÖs Theorem

EulerŌĆÖs Theorem states that for a function `\(f(x, y)\)` that is **homogeneous of degree n**:
- If `\(f(tx, ty) = t^n f(x, y)\)` for all `\(t &gt; 0\)`, then:
$$
x \frac{\partial f}{\partial x} + y \frac{\partial f}{\partial y} = n f(x, y)
$$ 

General form:
`$$x f_x + y f_y = n f(x, y)$$`

Interpretation: if a differentiable function is homogeneous of degree `\(n\)`, then the weighted sum of its marginal effects equals `\(n\)` times the function itself.

Used in economic models with **returns to scale**.

---

# Practice Problems

1. Let `\(Q = x^{0.6}y^{0.4}\)`. Find `\(E_x\)`, `\(E_y\)`

2. For `\(U = 3x + 4y\)`, compute `\(MU_x\)`, `\(MU_y\)`, and MRS

3. Let `\(Q = L^{0.7}K^{0.3}\)`, compute `\(MP_L\)`, `\(MP_K\)`, and MRTS at `\(L=2\)`, `\(K=3\)`

4. Verify Euler's theorem for `\(f(x, y) = x^2 + y^2\)`

---

class: my-one-page-font

# Problem # 4

### Verify Euler's theorem for `\(f(x, y) = x^2 + y^2\)`

WeŌĆÖll verify EulerŌĆÖs Theorem for the function:
$$
f(x, y) = x^2 + y^2
$$

#### Step 1: Homogeneity Check

Substitute `\(tx\)` and `\(ty\)` into `\(f\)`:

$$
f(tx, ty) = (tx)^2 + (ty)^2 = t^2x^2 + t^2y^2 = t^2(x^2 + y^2)
$$

So `\(f(x, y)\)` is homogeneous of **degree 2**.

#### Step 2: EulerŌĆÖs Theorem

EulerŌĆÖs Theorem states:

If `\(f\)` is homogeneous of degree `\(n\)`, then:
$$
x \cdot f_x + y \cdot f_y = n f(x, y)
$$
For our case, `\(n = 2\)`.



---

class: my-one-page-font

# Problem # 4 (continued)

#### Step 3: Find the Partial Derivatives

$$
\frac{\partial f}{\partial x} = 2x, \quad \frac{\partial f}{\partial y} = 2y
$$

Substitute into Euler's identity:

$$
x \cdot 2x + y \cdot 2y = 2x^2 + 2y^2 = 2(x^2 + y^2) = 2f(x, y)
$$

Verified! EulerŌĆÖs Theorem holds.

#### Interpretation: Returns to Scale

Since the function is homogeneous of **degree 2**, it exhibits:

**Increasing Returns to Scale**

&gt; Doubling both inputs will **quadruple** the output.

This concept is used widely in:
- Production theory
- Utility and cost functions
- Growth models

**Step 1:**

**Step 2:**

### Let `\(U = 3x + 4y\)`. Find `\(MU_x\)`, `\(MU_y\)`, MRS

**Step 1:**
\[ MU_x = 3, \quad MU_y = 4 \]

**Step 2:**
\[ MRS = \left| \frac{MU_x}{MU_y} \right| = \frac{3}{4} = 0.75 \]

Ō£ģ **Answer:** `\(MU_x = 3\)`, `\(MU_y = 4\)`, `\(MRS = 0.75\)`

**Step 1:**
\[ MP_L = 0.7L^{-0.3}K^{0.3}, \quad MP_K = 0.3L^{0.7}K^{-0.7} \]

**Step 2:** Evaluate:
\[ MP_L \approx 0.789, \quad MP_K \approx 0.226 \]

**Step 3:**
\[ MRTS = \left| \frac{MP_L}{MP_K} \right| \approx 3.49 \]

Ō£ģ **Answer:** `\(MP_L \approx 0.789\)`, `\(MP_K \approx 0.226\)`, `\(MRTS \approx 3.49\)`



# Ō£ģ Practice Problem 4

### Verify EulerŌĆÖs Theorem for `\(f(x, y) = x^2 + y^2\)`

**Step 1:**
\[ f_x = 2x, \quad f_y = 2y \]

**Step 2:**
\[ x f_x + y f_y = 2x^2 + 2y^2 \]

**Step 3:**
\[ \text{Function is homogeneous of degree } 2 \Rightarrow 2f(x, y) = 2(x^2 + y^2) \]

Ō£ģ EulerŌĆÖs Theorem holds.

# Summary

- Partial elasticities show **percentage responsiveness** to one variable

- Marginal utility/product: **sensitivity of outcome** to small changes

- MRS and MRTS reflect **substitution** between inputs or goods

- Euler's theorem links **homogeneity and returns to scale**

# Group Activity: Marginal Thinking in Real Life

### Instructions
- Form **6 groups** of **4-5 students**.

- Each group receives a different scenario.

- Use concepts from **partial elasticity**, **marginal utility/product**, and **MRS/MRTS** to answer.

- Prepare a **2-minute explanation**.

---

### Group Scenarios

#### Group 1 ŌĆō Production Line
A factory uses labor and capital to produce widgets:
- `\(Q = L^{0.6}K^{0.4}\)`
- Evaluate `\(MP_L\)` and `\(MP_K\)` at `\(L = 5\)`, `\(K = 5\)`
- What is the MRTS? What does it mean for the factory?

#### Group 2 ŌĆō Consumer Behavior
A consumer has utility function `\(U(x, y) = 2x + 3y\)`
- Find `\(MU_x\)`, `\(MU_y\)`, and MRS
- If the consumer gives up 1 unit of `\(y\)`, how much `\(x\)` do they need to maintain utility?

---

### Group Scenarios (continued)

#### Group 3 ŌĆō Elastic Demand
A firm's revenue depends on two prices:
- `\(R = p_1^{0.7}p_2^{0.3}\)`
- Compute partial elasticities with respect to `\(p_1\)` and `\(p_2\)`
- Which price affects revenue more? How should the firm respond?

#### Group 4 ŌĆō Policy Maker
A government economist analyzes GDP:
- `\(Y = C^{0.8}I^{0.2}\)`
- Compute `\(E_C\)`, `\(E_I\)`
- If investment falls, can consumption make up for it?

---
### Group Scenarios (continued)
#### Group 5 ŌĆō Cost Function
A company has a cost function:
- `\(C = wL + rK\)`
- Find the partial effect of labor and capital on total cost
- How does the cost change if they hire one more worker or rent one more machine?
#### Group 6 ŌĆō Utility Maximization
A consumer chooses between two goods with utility function:
- `\(U(x, y) = x^{0.5}y^{0.5}\)`
- Find `\(MU_x\)`, `\(MU_y\)`, and MRS
- If the consumer wants to maintain utility while giving up 1 unit of `\(y\)`, how much `\(x\)` do they need?

???


# Ō£ģ Group 1 ŌĆō Production Line

**Function:** \( Q = L^{0.6}K^{0.4} \), with \( L = 5 \), \( K = 5 \)

- \( MP_L = 0.6L^{-0.4}K^{0.4} = 0.6 \)
- \( MP_K = 0.4L^{0.6}K^{-0.6} = 0.4 \)
- \( MRTS = \left| \frac{MP_L}{MP_K} \right| = \frac{0.6}{0.4} = 1.5 \)

**Interpretation:**
Using 1 more unit of labor allows the firm to reduce capital by 1.5 units while maintaining output.


# Ō£ģ Group 2 ŌĆō Consumer Behavior

**Utility:** \( U(x, y) = 2x + 3y \)

- \( MU_x = 2, \quad MU_y = 3 \)
- \( MRS = \left| \frac{MU_x}{MU_y} \right| = \frac{2}{3} \)
- Giving up 1 unit of \( y \) requires \( 1.5 \) units of \( x \) to keep utility constant.


# Ō£ģ Group 3 ŌĆō Elastic Demand

**Revenue Function:** \( R = p_1^{0.7}p_2^{0.3} \)

- \( E_{p_1} = 0.7 \), \( E_{p_2} = 0.3 \)

**Interpretation:**
Revenue is more sensitive to \( p_1 \) than \( p_2 \). The firm should prioritize pricing strategy around \( p_1 \).

# Ō£ģ Group 4 ŌĆō Policy Maker

**GDP Function:** \( Y = C^{0.8}I^{0.2} \)

- \( E_C = 0.8 \), \( E_I = 0.2 \)

**Interpretation:**
Consumption drives GDP more than investment. If investment falls, consumption can **partially** compensate but not fully due to elasticity.

# Ō£ģ Group 5 ŌĆō Cost Function
**Cost Function:** \( C = wL + rK \)
- Partial effect of labor on total cost: \( \frac{\partial C}{\partial L} = w \)
- Partial effect of capital on total cost: \( \frac{\partial C}{\partial K} = r \)
**Interpretation:**
Hiring one more worker increases cost by \( w \), renting one more machine increases cost by \( r \). The firm should compare these costs to the marginal product of each input.

# Ō£ģ Group 6 ŌĆō Utility Maximization
**Utility Function:** \( U(x, y) = x^{0.5}y^{0.5} \)
- \( MU_x = 0.5x^{-0.5}y^{0.5} \)
- \( MU_y = 0.5x^{0.5}y^{-0.5} \)
- \( MRS = \left| \frac{MU_x}{MU_y} \right| = \left| \frac{y}{x} \right| \)
- To maintain utility, the consumer gives up \( \frac{y}{x} \) units of \( y \) for 1 more unit of \( x \).


---

### Debrief Questions (for all groups)
1. Which input had the largest marginal effect?

2. Were the substitution rates intuitive?

3. How can these results help in **decision-making**?
