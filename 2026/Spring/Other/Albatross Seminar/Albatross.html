# International Commerce Today

.pull-left[

### International Commerce is no longer only:

* Trade
* Import / Export
* Logistics
* Accounting

]

.pull-right[

### Today it also includes:

* Artificial Intelligence
* Data Science
* FinTech
* Global Finance
* Digital Payments
* Geopolitics
* Central Banking
* Climate Risk
* Global Supply Chains

]

&gt; International commerce today is not only about goods crossing borders. It is also about information, finance, technology, and global coordination.

# Important Message

## Do not rush to define your entire future immediately.

### University is the time to:

Explore

Experiment

Build skills

Learn how to think

Networking

Having fun

---

# Core Skills in 2030

.pull-left[

### What employers expect

According to the World Economic Forum, the most important future skills combine:

- *AI and big data*
- *Technological literacy*
- *Analytical thinking*
- *Creative thinking*
- *Curiosity and lifelong learning*
- *Resilience and flexibility*

### Key message

International Commerce students need both:

**technical skills** + **human skills**

]

#### Have your own standards and principles.

#### Try difficult things early.

#### Learn how to communicate clearly.

#### Collaborate with others.

#### Build solid knowledge and real skills.

#### Become professionals in whatever field you choose.
