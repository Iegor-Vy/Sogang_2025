# Correlation

---
# Correlation

Correlation measures:

* strength
* direction

of a linear relationship.

Correlation analysis examines the relationship between two quantitative variables.

*Core question:*

&gt; Does the data indicate a linear relationship between the two variables?


---

# Correlation Coefficient

The correlation coefficient is denoted by:
.pull-left[
$$
r \quad \text{(sample)}
$$
]
.pull-right[
$$
\rho \quad \text{(population)}
$$
]

Definition:

.pull-left[
$$
r = \frac{s_{xy}}{s_x s_y}
$$
]
.pull-right[
$$
\rho = \frac{\sigma_{xy}}{\sigma_x \sigma_y}
$$
]

Here, `\(s_{xy}\)` and `\(\sigma_{xy}\)` are sample and population covariance, respectively.

.tiny[Covariance measures how two variables vary together. A positive covariance indicates that the variables tend to increase together, while a negative covariance indicates that one variable tends to increase when the other decreases. The correlation coefficient standardizes this measure by dividing by the product of the standard deviations, giving a value between -1 and 1 that is easier to interpret.]

# Interpretation of Correlation Coefficient

It ranges from -1 up to and including +1.


| Value of r | Interpretation               |
| ---------- | ---------------------------- |
| Near +1    | strong positive relationship |
| Near -1    | strong negative relationship |
| Near 0     | weak linear relationship     |


The coefficient of correlation measures the direction and strength of the linear relationship between two quantitative variables.

# Example: Compute Correlation


``` python
corr = df["advertising"].corr(df["sales"])

print(f"Correlation coefficient: {corr}")
```

```

```

## Interpretation

Positive correlation means:

* larger advertising spending

* tends to be associated with larger sales

---

# Important Warning

## Correlation does NOT imply causation

Two variables may move together because:

* one affects the other

* another hidden factor affects both

* coincidence

*For example, ice cream sales and number of K-pop concerts may both increase during summer months, but one does not cause the other.*

---
# Correlation Analysis – Example

The sales manager of Copier Sales of America wants to evaluate whether monthly sales calls are related to monthly copier sales.

A random sample of 15 sales representatives is selected, and for each representative the manager records:

* number of sales calls last month
* number of copiers sold last month

*Goal*: test whether sales calls and copiers sold are correlated at `\(\alpha = 0.05\)`.

&lt;div&gt;
.center[
&lt;img src="p4.png" width="65%"&gt;
]

&lt;/div&gt;

---
# Correlation Analysis – Example (cont.)

Step 1: State the null and alternate hypotheses.

$$
H_0: \rho = 0
$$

$$
H_1: \rho \ne 0
$$

Step 2: Select a level of significance.

$$
\alpha = 0.05
$$

Step 3: Identify the test statistic.

For testing a correlation coefficient, use:

$$
t = \frac{r\sqrt{n-2}}{\sqrt{1-r^2}}, \qquad df = n-2,
$$
where `\(n\)` is the sample size and `\(r\)` is the sample correlation coefficient.

---
# Correlation Analysis – Example (cont.)
Step 4: Formulate a decision rule. 

For a two-tailed test, reject `\(H_0\)` if:


$$
\lvert t \rvert &gt; t_{\alpha/2,\,n-2}
$$

With `\(n=15\)`, `\(df=13\)` and `\(\alpha/2=0.025\)`:


$$
\lvert t \rvert &gt; t_{0.025,13}
$$

(That is, `\(t\)` is greater than the critical value `\(t_{\alpha/2, n-2}\)` or less than `\(-t_{\alpha/2, n-2}\)`.)

$$
\lvert t \rvert &gt; 2.160
$$

&lt;div&gt;
.center[
&lt;img src="p5.png" width="30%"&gt;
]

&lt;/div&gt;

---
# Correlation Analysis – Example (cont.)
Step 5: Take a sample, calculate the statistics, arrive at a decision.   

&lt;div&gt;
.center[
&lt;img src="p6.png" width="90%"&gt;
]

&lt;/div&gt;

---
# Correlation Analysis – Example (cont.)

Step 5 (continued): Take a sample, calculate the statistics, arrive at a decision.   


&lt;div&gt;
.center[
&lt;img src="p7.png" width="60%"&gt;
]

&lt;/div&gt;

Step 6: Interpret the result.

The data indicate a statistically significant correlation between sales calls and copiers sold.

The sample correlation is `\(r = 0.865\)`, which suggests a strong positive linear relationship.

In practical terms, representatives who make more sales calls tend to sell more copiers.

*Important*: this result indicates association, not causation. *A different study design is required to establish causal effects.*

# Simple Linear Regression

---
# Example

* Assume a linear relationship between home size (square feet) and January heating cost.

Question:

How does heating cost change as home size increases?


* In a study of automobile fuel efficiency, assume a linear relationship between miles per gallon (MPG) and vehicle weight.

Question:

How does MPG change as vehicle weight increases?


&gt; In both cases, the slope of the regression line tells us the expected change in the response variable for a one-unit increase in the explanatory variable.

---
# Regression Analysis: Variables

In simple linear regression:

* `\(Y\)`: dependent (response) variable to be predicted
* `\(X\)`: independent (predictor) variable used for prediction

Examples:

* Home heating: `\(Y=\mathrm{Heating\ Cost}\)`, `\(X=\mathrm{Home\ Size}\)`

$$
  \mathrm{Heating\ Cost} = a + b(\mathrm{Home\ Size})
$$

* Fuel efficiency: `\(Y=\mathrm{MPG}\)`, `\(X=\mathrm{Car\ Weight}\)`

$$
  \mathrm{MPG} = a + b(\mathrm{Car\ Weight})
$$
---

# Simple Linear Regression: General Form

Goal: estimate the line that best predicts `\(Y\)` from `\(X\)`.

$$
\hat{y} = a + bX
$$

* `\(Y\)`: dependent (response) variable
* `\(X\)`: independent (predictor) variable
* `\(a\)` (intercept): expected value of `\(Y\)` when `\(X=0\)`
* `\(b\)` (slope): expected change in `\(Y\)` for a 1-unit increase in `\(X\)`
* `\(\hat{y}\)`: predicted value of `\(Y\)` based on the regression line

Least Squares Principle:

$$
	\text{Choose } a \text{ and } b \text{ to minimize } \sum_{i=1}^{n}(y_i-a-bx_i)^2
$$

# Regression Analysis – Example (cont.)
Step 1: Estimate the slope `\(b\)`.
&lt;div&gt;
.center[
&lt;img src="p11.png" width="48%"&gt;
]

&lt;/div&gt;

Step 2: Estimate the intercept `\(a\)`.
&lt;div&gt;
.center[

]

&lt;/div&gt;

Step 3: Write the regression equation.

$$
\widehat{\text{Copiers Sold}} = 19.9632 + 0.2608(\text{Sales Calls})
$$

Step 4: Predict sales for 20 calls.

$$
\widehat{\text{Copiers Sold}} = 19.9632 + 0.2608(20) = 25.1792
$$

---
# Regression Analysis: Testing the Significance of the Slope – Example
Step 1: State the null and alternate hypotheses.
.pull-left[
$$
H_0: \beta_1 = 0
$$
]
.pull-right[
$$
H_1: \beta_1 \ne 0
$$
]

Step 2: Select a level of significance.

$$
\alpha = 0.05
$$

Step 3: Identify the test statistic.

Use the slope t-test:

$$
t = \frac{b_1}{SE(b_1)} \sim t(n-2)
$$

---
# Regression Analysis: Testing the Significance of the Slope – Example

Step 4: Formulate a decision rule.

For a two-tailed test, reject `\(H_0\)` if:

$$
\lvert t \rvert &gt; t_{\alpha/2,\,n-2}
$$

With `\(n=15\)` (`\(df=13\)`):

$$
\lvert t \rvert &gt; t_{0.025,13}
$$

$$
\lvert t \rvert &gt; 2.160
$$

---
# Regression Analysis: Testing the Significance of the Slope – Example (cont.)

Step 5: Use the sample output (Excel/ANOVA table) and make a decision.

&lt;div&gt;
.center[
&lt;img src="p13.png" width="60%"&gt;
]

&lt;/div&gt;

Decision: Reject `\(H_0\)`. The slope is statistically different from zero.
---
# Regression Analysis: Testing the Significance of the Slope – Example (cont.)


Step 6: Interpret the result.

The estimated slope is about `\(0.2606\)`, so each additional sales call is associated with an increase of about `\(0.2606\)` copiers sold, on average.

If sales calls increase by 10, predicted copier sales increase by about `\(2.606\)`.

As with correlation analysis, this does not by itself establish causality. Causal interpretation requires stronger assumptions (for example, no correlation between `\(X\)` and the error term).

# Coefficient of Determination: R-Squared
.pull-left[
R-squared measures:

&gt; how much variation in y is explained by x

## Interpretation of R-Squared

| R²     | Meaning                  |
| ------ | ------------------------ |
| Near 0 | weak explanatory power   |
| Near 1 | strong explanatory power |
]

.pull-right[

$$
R^2 = 0.70
$$

70% of variation in sales is explained by advertising.
]

# Prediction Example

Suppose:

$$
Sales = 20 + 3x
$$

If advertising = 15:

$$
Sales = 20 + 3(15)
$$

$$
= 65
$$

---

# Residuals
.pull-left[
Residual:

$$
e = y - \hat{y}
$$

Meaning:

* prediction error

## Visual Intuition

Residuals are:

* vertical distances
* between actual points and regression line
]
.pull-right[
## Why Residuals Matter

Large residuals may indicate:

* poor predictions
* missing variables
* unusual observations
]
---

# Example: Residual Plot

# Assumptions (Simplified)

Regression works best when:

* relationship is roughly linear

* residuals are random

* observations are independent

---

# Business Applications

Regression is widely used for:

* sales forecasting

* pricing analysis

* demand estimation

* customer analytics

* financial analysis

---

# Example Business Questions

* Does advertising affect sales?

* Does delivery time affect customer ratings?

# Common Mistakes

* assuming correlation means causation

* extrapolating too far outside data range

* ignoring outliers

* focusing only on R²

---

# Correlation vs Regression

| Correlation           | Regression             |
| --------------------- | ---------------------- |
| measures relationship | predicts outcome       |
| symmetric             | directional            |
| no dependent variable | has dependent variable |
