# Continuous vs Discrete
.pull-left[
Discrete:

* Count outcomes (0,1,2,…)
* Example: number of defaults


]
.pull-right[
Continuous:

* Any value in interval
* Example:

  * income
  * height
  * return

Important idea:
- Probability at a single point = 0
- We work with **intervals**
]

# Probability = Area

For continuous variables:

$$
P(a &lt; X &lt; b) = \text{area under curve}
$$

* Not probability of exact value
* Always **range-based thinking**

&gt; why area - because we are integrating the probability density function (PDF) over an interval to find the probability of the random variable falling within that interval.


.tiny[ PDF = probability density function, which describes the likelihood of a random variable taking on a specific value. The area under the PDF curve between two points gives the probability that the random variable falls within that range. ]

# Example: Bus Waiting Time

Sogang University provides bus service to students.  On weekdays, a bus arrives at the Back Gate stop every 30 minutes between 6 a.m. and 11 p.m. Students arrive at the bus stop at random times. The time that a student waits is uniformly distributed from 0 to 30 minutes.

Task: 
1. Draw a graph of this distribution.
2. Show that the area of this uniform distribution is 1.00.
3. How long will a student “typically” have to wait for a bus? In other words what is the mean waiting time? What is the standard deviation of the waiting times?
4. What is the probability a student will wait more than 25 minutes?
5. What is the probability a student will wait between 10 and 20 minutes?

# Python example (Uniform)


``` python
import numpy as np

# simulate waiting times
data = np.random.uniform(0, 30, 10000) # where 0 is min, 30 is max, and 10000 is number of samples

# probability of waiting more than 25
prob = np.mean(data &gt; 25)

prob
```

```
## np.float64(0.1668)
```

Simulation approximates probability, but we can also calculate it directly using the uniform distribution properties.


``` python
# calculate probability directly
prob = (30 - 25) / 30
prob
```

```
## 0.16666666666666666
```

# Characteristics of a Normal Probability Distribution

1. The location of a normal distribution is determined by the mean, `\(\mu\)`. The dispersion or spread of the distribution is determined by the standard deviation, `\(\sigma\)`.

2. The arithmetic mean, median, and mode are equal.

3. As a probability distribution, the total area under the curve is defined to be 1.00.

4. Because the distribution is symmetrical about the mean, half the area under the normal curve is to the right of the mean, and the other half to the left of it.

# Python Code for Normal Distribution


``` python
import numpy as np
import matplotlib.pyplot as plt

# Parameters
mu = 0
sigma = 1
x = np.linspace(-4, 4, 1000)

# Normal distribution formula
y = (1 / (sigma * np.sqrt(2 * np.pi))) * np.exp(-0.5 * ((x - mu) / sigma) ** 2)

# Plotting
plt.figure(figsize=(8, 4))
plt.plot(x, y, label=f'Normal Distribution (μ={mu}, σ={sigma})')
plt.title('Normal Distribution')
plt.xlabel('x')
plt.ylabel('Probability Density')
plt.legend()
plt.grid(True)
plt.show()
```

# Python Code for Comparing Normal Distributions


``` python
import numpy as np
import matplotlib.pyplot as plt
# Parameters for different normal distributions
params = [    (0, 1),   # mean=0, std=1
    (0, 2),   # mean=0, std=2
    (2, 1),   # mean=2, std=1
    (-2, 1)   # mean=-2, std=1
]
# Generate x values
x = np.linspace(-10, 10, 1000)
# Plot each normal distribution
plt.figure(figsize=(6, 3))
for mu, sigma in params:
    y = (1 / (sigma * np.sqrt(2 * np.pi))) * np.exp(-0.5 * ((x - mu) / sigma) ** 2)
    plt.plot(x, y, label=f'μ={mu}, σ={sigma}')
plt.title('Different Normal Distributions')
plt.xlabel('x')
plt.ylabel('Probability Density')
plt.legend()
plt.grid(True)
plt.show()
```

# The Standard Normal Probability Distribution

The standard normal distribution is a normal distribution with *mean 0* and *standard deviation 1*.
It is also called the **z distribution**.
A z-score measures how many standard deviations a value `\(X\)` is above or below the mean:

$$
Z = \frac{X-\mu}{\sigma}
$$

For the standard normal variable, `\(Z \sim N(0,1)\)` with density

$$
\phi(z)=\frac{1}{\sqrt{2\pi}}e^{-z^2/2}
$$

and interval probabilities are computed as

$$
P(a&lt;Z&lt;b)=\Phi(b)-\Phi(a).
$$
Where `\(\Phi(z)\)` is the cumulative distribution function (CDF) of the standard normal distribution, which gives the probability that a standard normal random variable is less than or equal to `\(z\)`.


.tiny[Note: The standard normal distribution is a special case of the normal distribution, and it is often used in statistics to standardize data and compute probabilities. The z-score allows us to compare values from different normal distributions by converting them to a common scale. Density function `\(\phi(z)\)` describes the shape of the standard normal distribution, while the cumulative distribution function `\(\Phi(z)\)` is used to calculate probabilities for intervals under the curve.]

# The Empirical Rule

.pull-left[
The standard normal table gives the area between the mean and a positive z-value.

- For `\(z=1.00\)`, the table value is `\(0.3413\)`, so
  `$$P(-1&lt;Z&lt;1)=2(0.3413)=0.6826$$`

- For `\(z=2.00\)`, the table value is `\(0.4772\)`, so
  `$$P(-2&lt;Z&lt;2)=2(0.4772)=0.9544$$`

- For `\(z=3.00\)`, the table value is `\(0.4987\)`, so
  `$$P(-3&lt;Z&lt;3)=2(0.4987)=0.9974$$`

]
.pull-right[
.center[
&lt;img src="p12.png" width="70%"&gt;
]
.tiny[Source: Douglas Lind, William Marchal, Samuel Wathen, Statistical Techniques in Business and Economics, 16th ed. (LMW)]

So approximately 68%, 95%, and 99.7% of observations lie within 1, 2, and 3 standard deviations of the mean.

]

# The Normal Distribution – Example

The weekly incomes of shift foremen in the glass industry follow the normal probability distribution with a mean of $1,000 and a standard deviation of $100. 

What is the z value for the income, let’s call it x, of a foreman who earns $1,100 per week? For a foreman who earns $900 per week?

Solution:
For $1,100:
`$$Z = \frac{1100 - 1000}{100} = 1.00$$`
For $900:
`$$Z = \frac{900 - 1000}{100} = -1.00$$`

# Normal Approximation to the Binomial

The normal distribution (a continuous distribution) yields a good approximation of the binomial distribution (a discrete distribution) for large values of n. 

The normal probability distribution is generally a good approximation to the binomial probability distribution when n  and n(1- ) are both greater than 5.

Why it's useful:
- simplifies calculations
- allows use of normal tables
---

# Normal Approximation to the Binomial

Using the normal distribution (a continuous distribution) as a substitute for a binomial distribution (a discrete distribution) for large values of n seems reasonable because, as n increases, a binomial distribution gets closer and closer to a normal distribution.

.center[
&lt;img src="p21.png" width="90%"&gt;
]
.tiny[Source: Douglas Lind, William Marchal, Samuel Wathen, Statistical Techniques in Business and Economics, 16th ed. (LMW)]

---
# Continuity Correction Factor

The value .5 subtracted or added, depending on the problem, to a selected value when a binomial probability distribution (a discrete probability distribution) is being approximated by a continuous probability distribution (the normal distribution).

.center[
&lt;img src="p22.png" width="70%"&gt;
]
.tiny[Source: Douglas Lind, William Marchal, Samuel Wathen, Statistical Techniques in Business and Economics, 16th ed. (LMW)]

---

# How to Apply the Correction Factor
1. Identify the value of x for which you want to find the probability.
2. Determine whether you are looking for P(X ≤ x), P(X &lt; x), P(X ≥ x), or P(X &gt; x).
3. Apply the continuity correction factor:
- For `\(P(X \le x)\)`, use `\(x + 0.5\)`
- For `\(P(X &lt; x)\)`, use `\(x - 0.5\)`
- For `\(P(X \ge x)\)`, use `\(x - 0.5\)`
- For `\(P(X &gt; x)\)`, use `\(x + 0.5\)`

Examples:

$$
P(X \le 10) \approx P(Y &lt; 10.5), \qquad P(X &lt; 10) \approx P(Y &lt; 9.5)
$$

$$
P(X \ge 10) \approx P(Y &gt; 9.5), \qquad P(X &gt; 10) \approx P(Y &gt; 10.5)
$$
